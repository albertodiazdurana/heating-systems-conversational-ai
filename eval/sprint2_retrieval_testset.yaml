# Sprint 2 retrieval test set.
#
# 12 hand-curated EN/DE queries: 6 EN + 6 DE, balanced 4 per category across
# standards / system concepts / MLOps. Each query carries the expected
# (source_doc, section_header) pair for strict hit@k scoring (see
# eval/exp001_retrieval_quality.py and the Sprint 2 plan §35).
#
# Ground-truth labels reference real chunks present in the index built by
# scripts/ingest.py against the dsm-residential-heating-ds-guide knowledge
# base. If the KB is updated and section headers shift, this file must be
# updated, not the runner.
#
# Success criteria (EXP-001): hit@5 >= 0.80, hit@1 >= 0.50.

queries:
  # --- Standards (4: 2 EN + 2 DE) ---
  - id: q01
    lang: en
    category: standards
    query: "What is DIN EN 12831 and how is it used to estimate heating load?"
    expected_source_doc: "01_Domain_Fundamentals.md"
    expected_section_header: "1.3 Degree-Day Calculations and Heating Load Estimation"
    notes: "DIN EN 12831 is discussed under heating load estimation in §1.3."

  - id: q02
    lang: en
    category: standards
    query: "Which DIN standards are referenced in this guide?"
    expected_source_doc: "06_References.md"
    expected_section_header: "DIN Standards"
    notes: "Direct hit on the References section listing DIN standards."

  - id: q03
    lang: de
    category: standards
    query: "Was regelt das Gebäudeenergiegesetz (GEG)?"
    expected_source_doc: "06_References.md"
    expected_section_header: "Gebäudeenergiegesetz (GEG)"
    notes: "DE legal-standard query, verbatim section header."

  - id: q04
    lang: de
    category: standards
    query: "Was ist die EnSimiMaV-Verordnung?"
    expected_source_doc: "06_References.md"
    expected_section_header: "EnSimiMaV (Energiesicherungsmaßnahmenverordnung)"
    notes: "DE energy-security regulation lookup."

  # --- System concepts (4: 2 EN + 2 DE) ---
  - id: q05
    lang: en
    category: concepts
    query: "How does a heating curve work in residential heating systems?"
    expected_source_doc: "01_Domain_Fundamentals.md"
    expected_section_header: "3.1 Heizkennlinie (Heating Curve)"
    notes: "Core domain concept, EN query against bilingual section title."

  - id: q06
    lang: en
    category: concepts
    query: "What are the differences between gas and oil boilers?"
    expected_source_doc: "01_Domain_Fundamentals.md"
    expected_section_header: "2.1 Gas and Oil Boilers"
    notes: "Heat-generator overview, EN."

  - id: q07
    lang: de
    category: concepts
    query: "Was bedeutet Vorlauf- und Rücklauftemperatur?"
    expected_source_doc: "01_Domain_Fundamentals.md"
    expected_section_header: "3.2 Vorlauf- und Rücklauftemperatur"
    notes: "DE technical term, verbatim section header in DE."

  - id: q08
    lang: de
    category: concepts
    query: "Wie funktioniert hydraulischer Abgleich nach Verfahren A und Verfahren B?"
    expected_source_doc: "01_Domain_Fundamentals.md"
    expected_section_header: "4.2 Verfahren A vs. Verfahren B"
    notes: "DE hydraulic-balancing query, technical mid-depth."

  # --- MLOps / Data science (4: 2 EN + 2 DE) ---
  - id: q09
    lang: en
    category: mlops
    query: "What is model predictive control for heating systems?"
    expected_source_doc: "02_Data_Science_ML.md"
    expected_section_header: "9.2 Model Predictive Control (MPC)"
    notes: "ML-for-control concept, EN."

  - id: q10
    lang: en
    category: mlops
    query: "How do you monitor a deployed ML model in production?"
    expected_source_doc: "03_Production_MLOps.md"
    expected_section_header: "14.4 Model Monitoring"
    notes: "Production MLOps, EN."

  - id: q11
    lang: de
    category: mlops
    query: "Welche Methoden zur Anomalieerkennung in Energiezeitreihen gibt es?"
    expected_source_doc: "02_Data_Science_ML.md"
    expected_section_header: "8.2 Machine Learning Methods"
    accept_alternatives:
      - source_doc: "05_Applied_Scenarios.md"
        section_header: "19.2 Design: Real-Time Anomaly Detection Pipeline"
    notes: |
      DE anomaly-detection query. Original expected was 8.2 ML Methods (chapter on
      anomaly detection). Empirically EXP-001 surfaced 19.2 Real-Time Anomaly
      Detection Pipeline as a defensible-better answer, captured here as an accepted
      alternative per Phase 5 EXP-001 first-run analysis (label-quality fix, not
      retrieval relaxation; see decision record).

  - id: q12
    lang: de
    category: mlops
    query: "Wie versioniere ich Machine-Learning-Modelle in einer Registry?"
    expected_source_doc: "03_Production_MLOps.md"
    expected_section_header: "14.2 Model Versioning and Registry"
    notes: "DE model-versioning query against EN section header (cross-lingual retrieval)."
